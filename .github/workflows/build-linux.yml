name: Build Linux Binary

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y build-essential musl-tools perl pkg-config cmake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/wy-gnb-pm-parser dist/wy-gnb-pm-parser-linux-x86_64-musl
          chmod +x dist/wy-gnb-pm-parser-linux-x86_64-musl
          file dist/wy-gnb-pm-parser-linux-x86_64-musl

      - name: Verify static Linux compatibility
        run: |
          ldd dist/wy-gnb-pm-parser-linux-x86_64-musl || true
          if ldd dist/wy-gnb-pm-parser-linux-x86_64-musl 2>&1 | grep -E 'GLIBC_|libc\.so|libssl|libcrypto'; then
            echo "Binary must not dynamically depend on glibc or system OpenSSL"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wy-gnb-pm-parser-linux-x86_64-musl
          path: dist/wy-gnb-pm-parser-linux-x86_64-musl
          if-no-files-found: error
