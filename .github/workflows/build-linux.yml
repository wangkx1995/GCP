name: Build Linux Binary

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config cmake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/release/wy-gnb-pm-parser dist/wy-gnb-pm-parser-linux-x86_64
          chmod +x dist/wy-gnb-pm-parser-linux-x86_64
          file dist/wy-gnb-pm-parser-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wy-gnb-pm-parser-linux-x86_64
          path: dist/wy-gnb-pm-parser-linux-x86_64
          if-no-files-found: error
