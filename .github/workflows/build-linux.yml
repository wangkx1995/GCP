name: Build Linux Binary

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y build-essential musl-tools perl pkg-config cmake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          # parser CLI
          cp target/x86_64-unknown-linux-musl/release/wy-gnb-pm-parser dist/wy-gnb-pm-parser-linux-x86_64-musl
          chmod +x dist/wy-gnb-pm-parser-linux-x86_64-musl
          # core server
          cp target/x86_64-unknown-linux-musl/release/core dist/core-linux-x86_64-musl
          chmod +x dist/core-linux-x86_64-musl
          # agent daemon
          cp target/x86_64-unknown-linux-musl/release/agent dist/agent-linux-x86_64-musl
          chmod +x dist/agent-linux-x86_64-musl
          # verify files
          file dist/*

      - name: Verify static Linux compatibility
        run: |
          for bin in dist/*; do
            echo "Verifying $bin..."
            ldd "$bin" || true
            if ldd "$bin" 2>&1 | grep -E 'GLIBC_|libc\.so|libssl|libcrypto'; then
              echo "FAIL: $bin must not dynamically depend on glibc or system OpenSSL"
              exit 1
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rnop-linux-x86_64-musl
          path: dist/
          if-no-files-found: error
